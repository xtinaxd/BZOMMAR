<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Index Mobile Preview</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            background: #0f0f10;
            font-family: Arial, sans-serif;
            color: #f5f5f5;
            padding: 24px;
            box-sizing: border-box;
        }

        .preview {
            display: grid;
            gap: 14px;
            justify-items: center;
        }

        .label {
            font-size: 12px;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: #d89b50;
        }

        .frame {
            width: 390px;
            height: 844px;
            border: 1px solid rgba(255, 255, 255, 0.16);
            border-radius: 30px;
            overflow: hidden;
            background: #000;
            box-shadow: 0 24px 80px rgba(0, 0, 0, 0.45);
        }

        iframe {
            display: block;
            width: 390px;
            height: 844px;
            border: 0;
            background: #fff;
        }
    </style>
</head>
<body>
    <div class="preview">
        <div class="label">390 x 844 Preview</div>
        <div class="frame">
            <iframe src="./index.html" title="Index Mobile Preview"></iframe>
        </div>
    </div>
</body>
</html>
